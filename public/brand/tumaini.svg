<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TABHOS">
  <!-- Tumaini brandmark — Tanzania silhouette + 4 flag-toned dots.
       Static thumbnail / favicon (no animation). Cream field, deep teal
       country, dots: ink / gold / navy / flag-green. -->
  <rect width="512" height="512" fill="#F4EAC9"/>
  <g transform="translate(256 256)">
    <!-- mainland -->
    <path
      d="M -150 -90 L -120 -110 L -90 -118 L -55 -125
         C -40 -132, -10 -135, 10 -130 L 30 -118 L 25 -100 L 50 -95
         L 78 -110 L 110 -100 L 130 -75
         C 148 -50, 158 -20, 160 5
         C 160 35, 150 65, 138 92
         L 120 118 L 80 132 L 30 138 L -20 140 L -70 138 L -110 132
         L -140 110 L -155 75 L -160 35 L -158 -5 L -158 -45 L -150 -90 Z"
      fill="#1A3E44"/>
    <!-- Lake Victoria notch -->
    <ellipse cx="-95" cy="-105" rx="28" ry="14" fill="#F4EAC9"/>
    <!-- Zanzibar + Pemba + Mafia -->
    <ellipse cx="150" cy="50" rx="9" ry="20" fill="#1A3E44"/>
    <ellipse cx="148" cy="15" rx="5" ry="11" fill="#1A3E44"/>
    <circle  cx="140" cy="85" r="3.5" fill="#1A3E44"/>
  </g>
  <!-- Four cardinal discs: ink top, gold right, navy bottom, green left -->
  <circle cx="256" cy="56"  r="22" fill="#1A3E44"/>
  <circle cx="456" cy="256" r="24" fill="#B8951F"/>
  <circle cx="256" cy="456" r="22" fill="#1F3A6E"/>
  <circle cx="56"  cy="256" r="24" fill="#1EB53A"/>
</svg>
