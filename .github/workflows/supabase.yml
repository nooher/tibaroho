name: Supabase migrations

# Auto-applies new SQL migrations in supabase/migrations/* to the THOS
# Supabase project whenever they land on main. Requires the following
# repo secrets (set under Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN   personal token from https://app.supabase.com/account/tokens
#   SUPABASE_DB_PASSWORD    Postgres password for the THOS project
#
# The project ref is hard-coded (ihjkgvhstzgaxddptaot, "THOS") because all
# Laetoli health products co-host until Laetoli Data (sovereign, Tanzania)
# is live.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ihjkgvhstzgaxddptaot
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to THOS project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations
        run: supabase db push
