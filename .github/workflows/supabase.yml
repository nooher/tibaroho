name: Supabase migrations

# Auto-applies new SQL migrations in supabase/migrations/* to the THOS
# Supabase project whenever they land on main.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN   personal token from https://app.supabase.com/account/tokens
#   SUPABASE_DB_PASSWORD    Postgres password for the THOS project
#
# Until those secrets are set the workflow is a clean no-op (no failure
# emails). Migrations meanwhile are applied via `npx supabase db push`
# from the developer's machine.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ihjkgvhstzgaxddptaot
    steps:
      - uses: actions/checkout@v4

      - name: Gate on configuration
        id: gate
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Skipping — SUPABASE_ACCESS_TOKEN and/or SUPABASE_DB_PASSWORD secrets are not set."
            echo "Migrations were applied locally by the committer via 'npx supabase db push'."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.gate.outputs.configured == 'true'
        with:
          version: latest

      - name: Link to THOS project
        if: steps.gate.outputs.configured == 'true'
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations
        if: steps.gate.outputs.configured == 'true'
        run: supabase db push
